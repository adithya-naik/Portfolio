<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        .contact-main-box{
            background-color: rgb(255, 255, 255);
            width: 80%;
            /* height: 10%; */
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            justify-content: center;
            align-items: center ;
        }
        .contact-pic img{
            width: 250px;
        }
        .contact-logo{
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10px;
            padding: 14px;
            color: cadetblue;
            font-weight: 600;
        }
        .contact-logo:hover{
            color: black;
        }
        .contact-logo img{
            width: 50px;
        }
        a{
            text-decoration: none;
        }
        .contact-links{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            
        }
    </style>
</head>
<body>
    <div class="contact-main-box">
        <div class="contact-heading">
            <h1 class="contact-heading">Feel free to Conatct me!</h1>
        </div>
        <div class="contact-pic">
            <img src="images/my pic.jpg" alt="My-Pic">
        </div>
        <div class="conatct-social-media-icons">
            <div class="contact-links">
                <a class="contact-logo"  target="_blank"  href="https://github.com/adithya-naik/Calculator"><img src="images/new-git.png" alt="GitHub Logo">GitHub-Repo</a>
                <a class="contact-logo"  target="_blank"  href="https://adithya-naik.github.io/Calculator/"><img src="images/new-preview.png" alt="PreviewLogo"> Live Preview</a>
              </div>
        </div>
    </div>
</body>
</html>
